version: '3'

# =============================================================================
# Variables — surchargables via .envrc
# =============================================================================
vars:
  VM_CPUS:  '{{.VM_CPUS  | default "2"}}'
  VM_MEM:   '{{.VM_MEM   | default "2048"}}'


# =============================================================================
# Tâches
# =============================================================================
tasks:

  default:
    desc: Lister les tâches disponibles
    silent: true
    cmds:
      - task --list

  # ---------------------------------------------------------------------------
  setup:
    desc: "🚀 Bootstrap complet du lab Teleport (Vagrant + Ansible)"
    cmds:
      - task: _check-deps
      - task: _vagrant-up
      - task: _summary

  # ---------------------------------------------------------------------------
  destroy:
    desc: "🗑️  Supprimer les VMs du lab"
    prompt: "Supprimer toutes les VMs Vagrant ?"
    cmds:
      - vagrant destroy -f
      - rm -rf .vagrant
      - echo "✓ Lab supprimé"

  # ---------------------------------------------------------------------------
  status:
    desc: "📊 État des VMs"
    silent: true
    cmds:
      - vagrant status

  # ---------------------------------------------------------------------------

  logs:bastion:
    desc: "📋 Logs Teleport du bastion (live)"
    cmds:
      - vagrant ssh teleport-bastion -- sudo journalctl -u teleport -f --no-pager

  logs:target:
    desc: "📋 Logs Teleport du target (live)"
    cmds:
      - vagrant ssh target-server -- sudo journalctl -u teleport -f --no-pager

  display-admin-invite:bastion:
    desc: "Afficher le fichier d'invitation admin du bastion"
    cmds:
      - vagrant ssh teleport-bastion -- cat /tmp/admin-invite.txt 2>/dev/null || echo "(pas encore créé)"

  # ---------------------------------------------------------------------------
  # Tâches internes
  # ---------------------------------------------------------------------------

  _check-deps:
    internal: true
    preconditions:
      - sh: command -v vagrant
        msg: |
          vagrant n'est pas installé.
          → https://www.vagrantup.com
      - sh: command -v ansible-playbook
        msg: |
          ansible n'est pas installé.
          → apt install ansible   ou   pip install ansible
    cmds:
      - echo "✓ Dépendances OK (Vagrant + Ansible)"

  _vagrant-up:
    internal: true
    silent: true
    cmds:
      - VM_CPUS={{.VM_CPUS}} VM_MEM=4096 vagrant up

  _summary:
    #internal: true
    silent: true
    vars:
      BASTION_IP:
        sh: vagrant ssh teleport-bastion -c "hostname -I | awk '{print \$2}'" | tr -d '\r'
      TARGET_IP:
        sh: vagrant ssh target-server -c "hostname -I | awk '{print \$2}'" | tr -d '\r'
    cmds:
      - |
        echo ""
        echo "╔══════════════════════════════════════════════════════════════════╗"
        echo "║               TELEPORT LAB — DÉPLOYÉ                            ║"
        echo "╚══════════════════════════════════════════════════════════════════╝"
        echo ""
        printf "  %-22s %s  (IP: %s)\n" "Bastion :" "teleport-bastion" "{{.BASTION_IP}}"
        printf "  %-22s %s  (IP: %s)\n" "Target :"  "target-server"  "{{.TARGET_IP}}"
        echo ""
        echo "  ── INTERFACE WEB (Teleport) ────────────────────────────────────"
        echo "  https://{{.BASTION_IP}}:3080"
        echo "  (accepter le certificat auto-signé)"
        echo ""
        echo "  ── RÉCUPÉRER LE LIEN ADMIN ────────────────────────────────────"
      - task: display-admin-invite:bastion
        silent: true
      - |
        echo ""
        echo "  ── CONNEXION TSH ──────────────────────────────────────────────"
        echo "  tsh login --proxy={{.BASTION_IP}}:3080 --insecure --user=teleport-admin"
        echo ""
        echo "  ── ACCÈS SSH ──────────────────────────────────────────────────"
        echo "  tsh ls                     # Lister les nodes"
        echo "  tsh ssh ubuntu@target-server"
        echo ""
        echo "  ── ACCÈS APP (nginx) ──────────────────────────────────────────"
        echo "  tsh apps ls"
        echo "  tsh apps login nginx-app"
        echo "  tsh proxy app nginx-app --port=8080"
        echo "  # Puis : open http://localhost:8080"
        echo ""
        echo "  ── ACCÈS DB (MySQL) ────────────────────────────────────────────"
        echo "  tsh db ls"
        echo "  tsh db login mysql-lab --db-user=alice"
        echo "  tsh db connect mysql-lab"
        echo ""
        echo "Join Token : a373a1c1d9cb7cc343d149402029dbb6"
        echo ""
