---
- name: Deploy Target Server (Nginx + MySQL + Teleport Agent)
  hosts: target-server
  become: yes
  gather_facts: yes
  vars:
    teleport_mode: agent
    teleport_nodename: target-server

  pre_tasks:
    - name: Ensure bastion_ip is set from group_vars
      debug:
        msg: "Using bastion_ip from group_vars: {{ bastion_ip }}"

  roles:
    - nginx
    - mysql
    - teleport

  post_tasks:
    - name: Display target information
      debug:
        msg: |
          ✓ Target Server deployed successfully
          IP: {{ ansible_default_ipv4.address }}
          Services:
            • Nginx: http://{{ ansible_default_ipv4.address }}:80
            • MySQL: {{ ansible_default_ipv4.address }}:3306
            • Teleport Agent: connected to bastion
