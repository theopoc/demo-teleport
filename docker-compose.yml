version: '3.8'

services:
  teleport-bastion:
    image: ubuntu:24.04
    container_name: teleport-bastion
    hostname: teleport-bastion
    ports:
      - "3080:3080"
      - "3025:3025"
      - "3024:3024"
    environment:
      - DEBIAN_FRONTEND=noninteractive
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
    command: /bin/bash -c "apt-get update && apt-get install -y openssh-server sudo && mkdir -p /run/sshd && /usr/sbin/sshd -D"
    networks:
      - teleport-lab
    cpus: '2'
    mem_limit: 2048m

  target-server:
    image: ubuntu:24.04
    container_name: target-server
    hostname: target-server
    ports:
      - "8080:80"
      - "3306:3306"
    environment:
      - DEBIAN_FRONTEND=noninteractive
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
    command: /bin/bash -c "apt-get update && apt-get install -y openssh-server sudo && mkdir -p /run/sshd && /usr/sbin/sshd -D"
    networks:
      - teleport-lab
    cpus: '2'
    mem_limit: 2048m
    depends_on:
      - teleport-bastion

networks:
  teleport-lab:
    driver: bridge
